<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Market Briefing</title>
<script>
// ═══════════════════════════════════════════════════════
//  BRIEFING DATA — Claude updates this block each morning
// ═══════════════════════════════════════════════════════
const D = {
  date: "Wednesday, June 17, 2026",
  sentiment: "neutral",

  ticker_bar: [
    { label:"SPX",  value:"7,536",   change:"+0.33%", up:true  },
    { label:"NDX",  value:"30,539",  change:"+0.50%", up:true  },
    { label:"DOW",  value:"52,418",  change:"+0.15%", up:true  },
    { label:"VIX",  value:"17.68",   change:"mod",    up:false, neutral:true },
    { label:"WTI",  value:"$75.12",  change:"-1.2%",  up:false },
    { label:"NG",   value:"$2.77",   change:"-0.6%",  up:false }
  ],

  snapshot: [
    { label:"S&P 500 Futures",    value:"7,536", change:"+0.33%", up:true, note:"Edging higher ahead of 2:30pm ET Fed press conference" },
    { label:"Nasdaq 100 Futures", value:"30,539", change:"+0.50%", up:true, note:"AI/tech names leading pre-market gains" }
  ],

  vix: { value:"17.68", pct:35, note:"Moderate caution — typical Fed-day premium; 52-wk range 12–32" },

  commodities: [
    { label:"WTI Crude Oil", value:"$75.12", change:"-1.2%", up:false, note:"5th straight down session; 3-month low on Iran deal supply outlook" },
    { label:"Brent Crude",   value:"$78.50", change:"-1.0%", up:false, note:"Iran-US deal to be signed Friday; Tehran oil exports to resume" },
    { label:"Natural Gas",   value:"$2.77",  change:"-0.6%", up:false, note:"Near multi-month lows; demand flat amid mild summer start" }
  ],

  news: [
    { title:"Kevin Warsh Chairs First FOMC Meeting — Rate Hold Expected, Dot Plot in Focus", tags:[{label:"Macro",cls:"tag-macro"},{label:"Fed",cls:"tag-macro"}], summary:"The Federal Reserve is holding rates at 3.50%–3.75% with a 97% market probability of no change. This is new Fed Chair Kevin Warsh's first meeting. The updated dot plot and 2:30pm ET press conference are the key events. May CPI at 4.2% YoY is expected to eliminate the single projected rate cut from March — and at least three members are seen projecting hikes. First cut now priced no earlier than mid-2027.", why:"Every statement, dot, and word from Warsh will move markets today. Watch for any hawkish tilt in forward guidance — that could reprice rate expectations and hit long-duration tech." },
    { title:"Iran-US Peace Deal Set for Friday Signing — Oil Hits 3-Month Low", tags:[{label:"Geopolitical",cls:"tag-geo"},{label:"Energy",cls:"tag-energy"}], summary:"An interim US-Iran agreement is scheduled to be signed in Switzerland on Friday, allowing Tehran to immediately resume oil exports and ease Strait of Hormuz restrictions. Over 100 oil-laden ships currently held in the Gulf could be released, significantly boosting global supply. WTI is now in its 5th straight down session approaching $75/bbl.", why:"If signed, this is a major supply catalyst that could push WTI toward $70. Upstream energy names (COP, XOM, CVX) face near-term headwinds. Watch for a dip-buy setup in integrated majors if crude finds a floor." },
    { title:"May CPI at 4.2% YoY Eliminates 2026 Rate Cut Expectations", tags:[{label:"Macro",cls:"tag-macro"},{label:"Inflation",cls:"tag-macro"}], summary:"May inflation came in hot at 4.2% year-over-year, driven by a 23.5% annual surge in energy prices from the Strait of Hormuz disruption. Core CPI rose 0.2% monthly and 2.9% annually — still well above the Fed's 2% target. Futures markets now price no cut before mid-2027 and have opened the door to rate hike discussion.", why:"Higher-for-longer rates are a headwind for growth stocks and leveraged names. But AI capex spending appears insulated — the key question is whether rate sensitivity bites consumer tech and SaaS multiples." },
    { title:"BMW Slashes 2026 Profit Outlook, Shares Drop 7% to 5-Year Low", tags:[{label:"Earnings",cls:"tag-macro"},{label:"Geopolitical",cls:"tag-geo"}], summary:"BMW cut its 2026 profit outlook citing weakening China/Asia Pacific sales and elevated energy costs from the Iran conflict. Shares fell ~7% to their lowest in over five years. The automaker is a bellwether for how geopolitical energy disruption is now flowing through to non-energy corporate margins.", why:"A warning shot for any industrial or manufacturing name with European exposure and energy-intensive operations. Watch for read-through to other auto/industrial sectors." },
    { title:"AI Infrastructure Stocks Lead Pre-Market — NVDA, Semis Outperform", tags:[{label:"Tech",cls:"tag-tech"},{label:"AI",cls:"tag-tech"}], summary:"Semiconductor and AI-linked names are outperforming broadly in pre-market trading. NVIDIA is up ~0.48% after announcing a collaborative AI-within-fabs initiative with TSMC. Micron traded an unusual $35B in dollar volume Tuesday. The broader narrative: AI infrastructure capex remains insulated from macro headwinds, with investors treating it as a defensive growth play.", why:"If Warsh's press conference is perceived as hawkish, growth stocks could give back gains. But AI infrastructure names with durable revenue visibility (NVDA, TSMC) may hold better than rate-sensitive SaaS." }
  ],

  tech_stocks: [
    { ticker:"NVDA", name:"NVIDIA Corp", price:"$208.40", perf:"+0.48%", up:true, note:"Pre-market gains on AI demand + TSMC fab collaboration" },
    { ticker:"AMD",  name:"Advanced Micro Devices", price:"$466.38", perf:"Recovering", up:true, note:"Rebounding from -10.86% sell-off on June 5; consolidating" },
    { ticker:"MU",   name:"Micron Technology", price:"$142.50", perf:"-0.70%", up:false, note:"$35B unusual dollar volume Tuesday — institutional repositioning" }
  ],

  energy_stocks: [
    { ticker:"XOM", name:"ExxonMobil Corp", price:"$122.40", perf:"+0.2%",  up:true,  note:"Defensive integrated; YTD +6.6%, dividend cushion vs crude drop" },
    { ticker:"CVX", name:"Chevron Corp",    price:"$163.50", perf:"-0.5%",  up:null,  note:"Higher yield play; more upstream crude exposure, YTD +1.4%" },
    { ticker:"COP", name:"ConocoPhillips",  price:"$105.20", perf:"-1.2%",  up:false, note:"Pure-play upstream; most sensitive to crude decline, watch for entry" }
  ],

  watchlist: [
    { ticker:"NVDA", company:"NVIDIA Corp", desc:"AI infrastructure demand + Fed-day catalyst. Pre-market strength; watch post-2:30pm reaction.", change:"+0.48%", up:true },
    { ticker:"MU",   company:"Micron Technology", desc:"$35B in unusual dollar volume Tuesday. Flat on surface but institutional rotation signal ahead of Fed.", change:"-0.70%", up:false },
    { ticker:"XOM",  company:"ExxonMobil", desc:"Oil at 3-month low on Iran deal. Watch for crude floor signal — integrated majors typically recover fastest post-supply shock.", change:"+0.2%", up:true }
  ]
};
// ═══════════════════════════════════════════════════════
</script>
<style>
  :root { color-scheme: light; --bg:#f4f5f7; --surface:#fff; --surface2:#f8f9fb; --border:#e2e6ea; --text:#0d1117; --muted:#8b93a4; --secondary:#5a6272; --green:#00c087; --green-bg:#e6f9f4; --red:#e05252; --red-bg:#fdf0f0; --blue:#2563eb; --blue-bg:#eff4ff; --amber:#d97706; --amber-bg:#fffbeb; --shadow:0 1px 3px rgba(0,0,0,.07); --shadow-md:0 4px 12px rgba(0,0,0,.08); }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px}
  .h-left{display:flex;align-items:center;gap:12px}
  .h-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
  .h-date{font-size:12px;color:var(--muted)}
  .badge{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600}
  .badge-on{background:var(--green-bg);color:var(--green);border:1px solid #a7f3d0}
  .badge-off{background:var(--red-bg);color:var(--red);border:1px solid #fca5a5}
  .badge-neutral{background:var(--amber-bg);color:var(--amber);border:1px solid #fcd34d}
  .dot{width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite}
  .dot-on{background:var(--green)} .dot-off{background:var(--red)} .dot-neutral{background:var(--amber)}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}
  .container{max-width:1100px;margin:0 auto;padding:20px 20px 40px}
  .section-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:20px 0 10px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow);transition:box-shadow .2s}
  .card:hover{box-shadow:var(--shadow-md)}
  .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:4px}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .metric-label{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .metric-value{font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1}
  .metric-sub{font-size:11px;color:var(--muted);margin-top:4px}
  .chip{display:inline-flex;align-items:center;font-size:12px;font-weight:600;padding:2px 8px;border-radius:5px;margin-top:5px}
  .up{color:var(--green);background:var(--green-bg)} .down{color:var(--red);background:var(--red-bg)} .neutral{color:var(--amber);background:var(--amber-bg)}
  .status-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 18px;display:flex;align-items:center;flex-wrap:wrap;gap:8px 18px;box-shadow:var(--shadow);margin-bottom:4px}
  .si{display:flex;align-items:center;gap:8px;font-size:12px}
  .si-label{color:var(--muted);font-weight:600}
  .si-val{font-weight:700}
  .sep{color:var(--border);font-size:16px}
  .vix-track{height:6px;background:#e2e6ea;border-radius:3px;margin-top:10px;position:relative}
  .vix-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#00c087,#d97706,#e05252)}
  .vix-needle{position:absolute;top:-4px;width:10px;height:14px;background:var(--text);border-radius:2px;border:2px solid #fff;box-shadow:0 0 0 1px var(--text)}
  .vix-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:6px}
  .news-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .2s,border-color .2s;margin-bottom:10px}
  .news-card:hover{box-shadow:var(--shadow-md);border-color:#c7d2fe}
  .news-header{display:flex;align-items:flex-start;gap:12px}
  .news-num{min-width:24px;height:24px;background:#eef2ff;color:#3730a3;border-radius:6px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .news-body{flex:1}
  .news-title{font-size:14px;font-weight:600;line-height:1.4}
  .news-summary,.news-why{display:none}
  .news-summary{font-size:13px;color:var(--secondary);margin-top:8px;line-height:1.6}
  .news-why{margin-top:10px;padding:10px 12px;background:var(--blue-bg);border-radius:8px;font-size:12px;color:#1e40af;line-height:1.5}
  .open .news-summary,.open .news-why{display:block}
  .toggle{color:var(--muted);font-size:16px;transition:transform .2s;margin-top:2px;line-height:1}
  .open .toggle{transform:rotate(180deg)}
  .tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.4px}
  .tag-geo{background:#fce7f3;color:#9d174d} .tag-macro{background:#ecfdf5;color:#065f46} .tag-tech{background:#eff6ff;color:#1d4ed8} .tag-energy{background:#fff7ed;color:#c2410c} .tag-ipo{background:#f5f3ff;color:#5b21b6}
  .sector-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
  .sector-title{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .sector-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px}
  .icon-tech{background:#eff6ff} .icon-energy{background:#fff7ed}
  .stock-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
  .stock-row:last-child{border-bottom:none;padding-bottom:0}
  .ticker{font-size:13px;font-weight:700;letter-spacing:.3px;min-width:48px}
  .stock-name{font-size:11px;color:var(--muted);margin-top:1px}
  .stock-right{text-align:right}
  .stock-price{font-size:13px;font-weight:600}
  .stock-note{font-size:11px;color:var(--secondary);max-width:200px;text-align:right;line-height:1.3;margin-top:2px}
  .watch-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
  .watch-row{display:flex;align-items:flex-start;gap:14px;padding:10px 8px;margin:0 -8px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:8px;transition:background .15s}
  .watch-row:last-child{border-bottom:none}
  .watch-row:hover{background:var(--surface2)}
  .watch-badge{min-width:52px;padding:5px 0;border-radius:8px;text-align:center;font-size:13px;font-weight:700}
  .watch-info{flex:1}
  .watch-ticker{font-size:13px;font-weight:700}
  .watch-company{font-size:11px;color:var(--muted)}
  .watch-desc{font-size:12px;color:var(--secondary);margin-top:4px;line-height:1.4}
  .watch-change{font-size:16px;font-weight:700;white-space:nowrap;padding-top:3px}
  .footer{text-align:center;color:var(--muted);font-size:11px;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
  @media(max-width:700px){.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div class="h-left">
    <div class="logo">M</div>
    <div>
      <div class="h-title">Morning Briefing</div>
      <div class="h-date" id="h-date"></div>
    </div>
  </div>
  <div class="badge" id="sentiment-badge">
    <span class="dot" id="sentiment-dot"></span>
    <span id="sentiment-text"></span>
  </div>
</div>
<div class="container">
  <div class="status-bar" id="ticker-bar" style="margin-top:4px"></div>
  <div class="section-label">Market Snapshot</div>
  <div class="g3" id="snapshot-cards"></div>
  <div class="section-label">Energy &amp; Commodities</div>
  <div class="g3" id="commodity-cards"></div>
  <div class="g2" style="margin-top:20px">
    <div>
      <div class="section-label" style="margin-top:0">Top Stories</div>
      <div id="news-list"></div>
    </div>
    <div>
      <div class="section-label" style="margin-top:0">Tech &amp; AI Sector</div>
      <div class="sector-panel" style="margin-bottom:16px" id="tech-panel"></div>
      <div class="section-label">Energy Equities</div>
      <div class="sector-panel" style="margin-bottom:16px" id="energy-panel"></div>
      <div class="section-label">Stocks to Watch</div>
      <div class="watch-card" id="watchlist"></div>
    </div>
  </div>
  <div class="footer">Data as of pre-market <span id="footer-date"></span> · For informational purposes only · Not financial advice</div>
</div>
<script>
function chip(change,up,neutral){const cls=neutral?'neutral':up?'up':'down';const arrow=neutral?'':up?'▲ ':'▼ ';return `<span class="chip ${cls}">${arrow}${change}</span>`}
function render(){
  document.getElementById('h-date').textContent=D.date;
  document.getElementById('footer-date').textContent=D.date;
  const sMap={'risk-on':['badge-on','dot-on','Risk-On'],'risk-off':['badge-off','dot-off','Risk-Off'],'neutral':['badge-neutral','dot-neutral','Neutral']};
  const[bc,dc,st]=sMap[D.sentiment]||sMap.neutral;
  document.getElementById('sentiment-badge').classList.add(bc);
  document.getElementById('sentiment-dot').classList.add(dc);
  document.getElementById('sentiment-text').textContent=st;
  const tb=document.getElementById('ticker-bar');
  tb.innerHTML=D.ticker_bar.map((t,i)=>{const cls=t.neutral?'neutral':t.up?'up':'down';return`${i>0?'<span class="sep">|</span>':''}<div class="si"><span class="si-label">${t.label}</span><span class="si-val">${t.value}</span><span class="chip ${cls}" style="padding:1px 6px">${t.change}</span></div>`}).join('');
  const sc=document.getElementById('snapshot-cards');
  sc.innerHTML=D.snapshot.map(s=>`<div class="card"><div class="metric-label">${s.label}</div><div class="metric-value">${s.value}</div>${chip(s.change,s.up)}<div class="metric-sub">${s.note}</div></div>`).join('')+`<div class="card"><div class="metric-label">VIX — Fear Index</div><div class="metric-value">${D.vix.value}</div><div class="vix-track"><div class="vix-fill" style="width:${D.vix.pct}%"></div><div class="vix-needle" style="left:calc(${D.vix.pct}% - 5px)"></div></div><div class="vix-labels"><span>0 — Calm</span><span>25</span><span>50 — Panic</span></div><div class="metric-sub" style="margin-top:6px">${D.vix.note}</div></div>`;
  document.getElementById('commodity-cards').innerHTML=D.commodities.map(c=>`<div class="card"><div class="metric-label">${c.label}</div><div class="metric-value">${c.value}</div>${chip(c.change,c.up)}<div class="metric-sub">${c.note}</div></div>`).join('');
  document.getElementById('news-list').innerHTML=D.news.map((n,i)=>`<div class="news-card" onclick="this.classList.toggle('open')"><div class="news-header"><div class="news-num">${i+1}</div><div class="news-body"><div class="news-title">${n.title}</div><div class="tags">${n.tags.map(t=>`<span class="tag ${t.cls}">${t.label}</span>`).join('')}</div><div class="news-summary">${n.summary}</div><div class="news-why"><strong>Why it matters:</strong> ${n.why}</div></div><div class="toggle">▾</div></div></div>`).join('');
  document.getElementById('tech-panel').innerHTML=`<div class="sector-title"><div class="sector-icon icon-tech">💻</div>Semiconductors & AI</div>${D.tech_stocks.map(s=>`<div class="stock-row"><div><div class="ticker">${s.ticker}</div><div class="stock-name">${s.name}</div></div><div class="stock-right"><div class="stock-price">${s.price}</div><div><span class="chip ${s.up?'up':s.up===false?'down':'neutral'}" style="font-size:11px;padding:1px 6px">${s.perf}</span></div><div class="stock-note">${s.note}</div></div></div>`).join('')}`;
  document.getElementById('energy-panel').innerHTML=`<div class="sector-title"><div class="sector-icon icon-energy">⚡</div>Energy</div>${D.energy_stocks.map(s=>`<div class="stock-row"><div><div class="ticker">${s.ticker}</div><div class="stock-name">${s.name}</div></div><div class="stock-right"><div class="stock-price">${s.price}</div><div><span class="chip ${s.up===true?'up':s.up===false?'down':'neutral'}" style="font-size:11px;padding:1px 6px">${s.perf}</span></div><div class="stock-note">${s.note}</div></div></div>`).join('')}`;
  document.getElementById('watchlist').innerHTML=D.watchlist.map(w=>`<div class="watch-row"><div class="watch-badge ${w.up?'up':'down'}">${w.ticker}</div><div class="watch-info"><div class="watch-ticker">${w.ticker}</div><div class="watch-company">${w.company}</div><div class="watch-desc">${w.desc}</div></div><div class="watch-change" style="color:${w.up?'var(--green)':'var(--red)'}">${w.change}</div></div>`).join('');
}
render();
</script>
</body>
</html>
